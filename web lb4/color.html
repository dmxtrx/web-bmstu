<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>цветной</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10vh 20vw 20px;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }
        #colorBlock {
            flex: 1;
            background-color: gray;
            width: 100%;
            border-radius: 8px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10vh;
        }
        button {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .green { background-color: green; }
        .blue { background-color: blue; }
        .red { background-color: red; }
        .random { background-color: black; }
    </style>
</head>
<body>
    <div id="colorBlock"></div>
    <div class="buttons">
        <button id="btnGreen" class="green">Зелёный</button>
        <button id="btnRed" class="red">Красный</button>
        <button id="btnRandom" class="random">Случайный</button>
        <button id="btnBlue" class="blue">Синий</button>
    </div>

    <script>
        const block = document.getElementById('colorBlock');

        document.getElementById('btnGreen').onclick = () => {
            block.style.backgroundColor = 'green';
        };
        document.getElementById('btnBlue').onclick = () => {
            block.style.backgroundColor = 'blue';
        };
        document.getElementById('btnRed').onclick = () => {
            block.style.backgroundColor = 'red';
        };
        document.getElementById('btnRandom').onclick = () => {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            block.style.backgroundColor = `rgb(${r},${g},${b})`;
        };
    </script>
</body>
</html>
